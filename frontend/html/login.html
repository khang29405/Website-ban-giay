<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - ShoeStore</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
    <header id="header"></header>

    <main>
        <div class="container">
            <div class="auth-wrapper">
                <div class="auth-card">
                    <h2>Đăng nhập</h2>
                    <p class="auth-subtitle">Chào mừng bạn quay lại ShoeStore.</p>

                    <div id="form-success" class="form-success" hidden></div>
                    <div id="form-error" class="form-error" hidden></div>

                    <form id="login-form" novalidate>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="Email" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Mật khẩu</label>
                            <input type="password" id="password" name="MatKhau" required minlength="6">
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Đăng nhập</button>
                    </form>

                    <p class="auth-switch">Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a></p>
                </div>
            </div>
        </div>
    </main>

    <footer id="footer"></footer>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/validate.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/pages/login.js"></script>
</body>
</html>
