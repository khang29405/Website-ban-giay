<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - ShoeStore</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header id="header"></header>

    <main class="auth-page">
        <h2>Đăng nhập</h2>
        <form id="login-form" class="auth-form">
            <label>Email</label>
            <input type="email" name="Email" required />

            <label>Mật khẩu</label>
            <input type="password" name="MatKhau" required minlength="6" />

            <button type="submit">Đăng nhập</button>
        </form>
        <p>Chưa có tài khoản? <a href="register.html">Đăng ký</a></p>
    </main>

    <footer id="footer"></footer>

    <script src="../js/main.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const form = e.target;
            const data = {
                Email: form.Email.value.trim(),
                MatKhau: form.MatKhau.value,
            };
            try {
                const res = await apiPost('/auth/login', data);
                if (res && res.token) {
                    setAuth(res.token, res.user);
                    window.location.href = 'index.html';
                } else {
                    alert('Đăng nhập thất bại');
                }
            } catch (err) {
                alert(err.message || 'Lỗi đăng nhập');
            }
        });
    </script>
</body>
</html>
