<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - ShoeStore</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
    <header id="header"></header>

    <main>
        <div class="container">
            <div class="auth-wrapper">
                <div class="auth-card">
                    <h2>Tạo tài khoản</h2>
                    <p class="auth-subtitle">Đăng ký để mua sắm tại ShoeStore.</p>

                    <div id="form-error" class="form-error" hidden></div>

                    <form id="register-form" novalidate>
                        <div class="form-group">
                            <label for="hoten">Họ tên</label>
                            <input type="text" id="hoten" name="HoTen" required maxlength="100">
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="Email" required maxlength="100">
                        </div>
                        <div class="form-group">
                            <label for="password">Mật khẩu</label>
                            <input type="password" id="password" name="MatKhau" required minlength="6">
                        </div>

                        <div class="form-group">
                            <label for="confirm-password">Xác nhận mật khẩu</label>
                            <input type="password" id="confirm-password" name="XacNhanMatKhau" required minlength="6">
                        </div>

                        <div class="form-group">
                            <label for="sdt">Số điện thoại (tuỳ chọn)</label>
                            <input type="text" id="sdt" name="SDT">
                        </div>
                        <div class="form-group">
                            <label for="diachi">Địa chỉ (tuỳ chọn)</label>
                            <input type="text" id="diachi" name="DiaChi">
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Đăng ký</button>
                    </form>

                    <p class="auth-switch">Đã có tài khoản? <a href="login.html">Đăng nhập</a></p>
                </div>
            </div>
        </div>
    </main>

    <footer id="footer"></footer>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/validate.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/pages/register.js"></script>
</body>
</html>
